<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <style>
      body {
        width: 320px;
        margin: 0;
        padding: 14px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Microsoft YaHei", sans-serif;
        color: #17202a;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 16px;
      }
      label {
        display: block;
        margin: 10px 0;
        font-size: 12px;
        color: #607083;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        margin-top: 5px;
        border: 1px solid #d8e1ea;
        border-radius: 6px;
        padding: 8px;
      }
      button {
        width: 100%;
        min-height: 36px;
        margin-top: 8px;
        border: 1px solid #30363d;
        border-radius: 6px;
        background: #30363d;
        color: #fff;
        font-weight: 700;
        cursor: pointer;
      }
      button.secondary {
        background: #fff;
        color: #17202a;
        border-color: #d8e1ea;
      }
      button:disabled {
        cursor: default;
        opacity: .6;
      }
      #status {
        margin-top: 10px;
        padding: 8px;
        border-radius: 6px;
        background: #eef3f7;
        font-size: 12px;
        line-height: 1.45;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }
      .hint {
        margin: 8px 0 0;
        color: #607083;
        font-size: 12px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <h1>舆情授权助手</h1>
    <label>
      后端地址
      <input id="apiBase" placeholder="http://127.0.0.1:8001">
    </label>
    <p class="hint">授权校验由后台自动处理，不需要填写令牌。</p>
    <button id="saveApi" type="button">保存后端地址</button>
    <button id="openAuth" type="button">打开全部授权页面</button>
    <button id="syncCurrent" class="secondary" type="button">同步当前页面</button>
    <div id="status">正在读取状态...</div>
    <script src="popup.js"></script>
  </body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="admin-console-session" content="__ADMIN_CONSOLE_SESSION__" />
  <title>个人资料 - Vecto</title>
  <link rel="stylesheet" href="/assets/opc/site-navigation.css?v=2026071801" />
  <link rel="stylesheet" href="/assets/profile.css?v=__PROFILE_CSS_VERSION__" />
  <script defer src="/assets/opc/site-navigation.js?v=2026071801"></script>
  <script defer src="/assets/profile.js?v=__PROFILE_JS_VERSION__"></script>
</head>
<body class="profile-page">
  <a class="site-skip-link" href="#main-content">跳至主要内容</a>
  <header class="site-header" data-site-header data-site-page="profile" data-site-mode="authenticated" data-site-variant="solid"></header>

  <main id="main-content" class="profile-main">
    <section class="profile-heading">
      <div>
        <span class="profile-eyebrow">账号资料</span>
        <h1>个人资料</h1>
        <p>设置显示名称和头像。登录用户名及账号权限不会因此改变。</p>
      </div>
      <a id="profileBackLink" class="profile-back-link" href="/console.html">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 18-6-6 6-6"></path></svg>
        <span>返回控制台</span>
      </a>
    </section>

    <section class="profile-workspace" aria-label="个人资料设置">
      <form id="profileForm" class="profile-form">
        <div class="profile-avatar-column">
          <span id="profileFormTitle" class="profile-section-label">头像</span>
          <button id="profileAvatarButton" class="profile-avatar-picker" type="button" aria-label="上传新头像" aria-controls="profileAvatarFile">
            <span id="profileAvatarPreview" class="profile-avatar-preview" aria-hidden="true">V</span>
            <span class="profile-avatar-add" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"></path></svg>
            </span>
          </button>
          <input id="profileAvatarFile" type="file" accept="image/png,image/jpeg,image/webp,image/gif" hidden />
          <p>点击头像右下角的加号上传，最大 140KB。</p>
          <button id="profileAvatarRemove" class="profile-avatar-remove" type="button" hidden>移除头像</button>
        </div>

        <div class="profile-fields">
          <label class="profile-field" for="profileFullName">
            <span>显示名称</span>
            <input id="profileFullName" name="full_name" type="text" maxlength="80" autocomplete="name" placeholder="请输入显示名称" />
            <small>显示在右上角账号信息中，不会修改登录用户名。</small>
          </label>

          <div class="profile-account-grid" aria-label="只读账号信息">
            <div>
              <span>登录用户名</span>
              <strong id="profileUsername">-</strong>
            </div>
            <div>
              <span>账号 ID</span>
              <strong id="profileAccountId">-</strong>
            </div>
            <div>
              <span>账号类型</span>
              <strong id="profileAccountRole">-</strong>
            </div>
          </div>

          <div class="profile-actions">
            <button id="profileSave" class="profile-save" type="submit">保存个人资料</button>
            <span id="profileStatus" class="profile-status" role="status" aria-live="polite"></span>
          </div>
        </div>
      </form>
    </section>
  </main>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>设置新密码 - Vecto</title>
  <link rel="stylesheet" href="/assets/style.css?v=__STYLE_VERSION__" />
</head>
<body class="page-auth-shell">
  <main class="auth-shell">
    <section class="auth-stage">
      <div class="auth-stage-head">
        <div class="auth-kicker">Vecto 账号安全</div>
        <h1 class="auth-stage-title">首次登录需要设置新密码</h1>
        <p class="auth-stage-copy">管理员生成的临时密码只用于首次验证。完成修改后，账号才会进入 Web 任务控制台。</p>
      </div>
      <div class="auth-stage-grid">
        <article class="auth-stage-card">
          <div class="auth-stage-card-title">临时密码</div>
          <div class="small">输入管理员提供的临时密码进行身份确认。</div>
        </article>
        <article class="auth-stage-card">
          <div class="auth-stage-card-title">新密码</div>
          <div class="small">使用至少 8 位且不易猜测的新密码。</div>
        </article>
      </div>
    </section>

    <section class="auth-card auth-card-product">
      <div class="auth-card-head">
        <h2 class="auth-title">设置新密码</h2>
        <p class="auth-sub">完成后将直接进入 Web 任务控制台</p>
      </div>
      <form id="forcePasswordForm" class="auth-form">
        <label for="oldPassword">临时密码</label>
        <input id="oldPassword" name="old_password" type="password" autocomplete="current-password" required />

        <label for="newPassword">新密码</label>
        <input id="newPassword" name="new_password" type="password" autocomplete="new-password" minlength="8" required />

        <label for="confirmPassword">确认新密码</label>
        <input id="confirmPassword" name="confirm_password" type="password" autocomplete="new-password" minlength="8" required />

        <div class="auth-submit-row">
          <button class="primary" type="submit">保存并进入控制台</button>
        </div>
      </form>
      <div id="authMsg" class="msg" role="status" aria-live="polite"></div>
      <div class="auth-quick-setup">
        <a class="btn ghost auth-quick-setup-link" href="/?login=1&amp;return_url=%2Fconsole.html">返回用户登录</a>
      </div>
    </section>
  </main>
  <script src="/assets/auth.js?v=__AUTH_JS_VERSION__"></script>
</body>
</html>

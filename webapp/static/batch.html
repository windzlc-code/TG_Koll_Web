<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>批量带货视频 - 电商带货视频生成平台</title>
  <link rel="stylesheet" href="/assets/style.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <h1>批量生成</h1>
        <p>参数预览 · 审核后执行</p>
      </div>
      <div class="card">
        <div class="row" style="justify-content:space-between">
          <div>
            <div class="small">账号</div>
            <div id="meName" style="font-weight:800">...</div>
          </div>
          <div style="text-align:right">
            <div class="small">额度(分)</div>
            <div id="meBalance" style="font-weight:800">0</div>
          </div>
        </div>
        <div class="row" style="margin-top:10px">
          <button id="btnBackHome" class="ghost" type="button">返回首页</button>
          <button id="btnLogout" class="ghost" type="button">退出</button>
        </div>
      </div>
      <div class="nav">
        <button type="button" data-scroll="secPlan">生成参数</button>
        <button type="button" data-scroll="secRun">确认执行</button>
      </div>
    </aside>

    <main class="main">
      <section class="card section" id="secPlan">
        <h2>批量带货视频：参数生成</h2>
        <div class="meta">上传 zip（建议每个子文件夹一条素材：包含模特图/商品图，可选运镜视频）。启用智能分析后，系统会按你的“参数要求”生成每条参数。</div>

        <label>素材包 zip</label>
        <input id="zipFile" type="file" accept=".zip" />

        <label>通用参数 defaults（JSON，对所有条目生效，可被每条 params 覆盖）</label>
        <textarea id="defaultsJson" placeholder='例如：{"duration_seconds":15,"use_ai_copy":true,"style_hint":"自然口播，真实电商场景","product_name":"商品"}'></textarea>

        <div class="row" style="margin-top:10px">
          <label class="switch" style="flex:1"><input id="enableAi" type="checkbox" checked /> 启用智能分析</label>
        </div>

        <label>参数要求（说明要生成什么字段、什么效果、输出结构）</label>
        <textarea id="paramPrompt" placeholder="例如：请为每条视频生成 params，包含 product_name、style_hint、speech_text、prompt_text；风格要更像直播间口播；每条口播 80-120 字；prompt_text 要有镜头节奏。"></textarea>

        <div class="row" style="margin-top:12px">
          <button id="btnPlan" class="primary" type="button">生成参数预览</button>
          <div id="planMsg" class="msg"></div>
        </div>

        <label>计划预览（plan JSON，可修改后再执行）</label>
        <textarea id="planJson" placeholder="点击生成后会出现在这里"></textarea>
      </section>

      <section class="card section" id="secRun">
        <h2>确认执行</h2>
        <div class="row" style="margin-top:12px">
          <button id="btnRun" class="blue" type="button">确认并开始批量生成</button>
          <div id="runMsg" class="msg"></div>
        </div>
        <div class="meta" style="margin-top:10px">开始后会生成一个生成编号，可在首页生成记录查看进度与下载结果 zip。</div>
        <div id="runResult" class="msg"></div>
      </section>
    </main>
  </div>

  <script src="/assets/batch.js"></script>
</body>
</html>

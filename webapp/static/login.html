<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 - Web 素材生成平台</title>
  <link rel="stylesheet" href="/assets/style.css?v=20260714-1" />
</head>
<body class="page-auth-shell">
  <main class="auth-shell">
    <section class="auth-stage">
      <div class="auth-stage-head">
        <div class="auth-kicker">素材生产工作台</div>
        <h1 class="auth-stage-title">Web 素材生成平台</h1>
        <p class="auth-stage-copy">上传参考图和参考图，集中处理生成记录、额度和客户账号，适合运营团队日常交付使用。</p>
      </div>
      <div class="auth-stage-grid">
        <article class="auth-stage-card">
          <div class="auth-stage-card-title">视频生成</div>
          <div class="small">主路径聚焦参考图、参考图和批量素材包，减少跳转和分散操作。</div>
        </article>
        <article class="auth-stage-card">
          <div class="auth-stage-card-title">生成记录</div>
          <div class="small">失败态、下载结果和处理进度都集中在同一处查看。</div>
        </article>
        <article class="auth-stage-card">
          <div class="auth-stage-card-title">额度管理</div>
          <div class="small">前台只看额度与消费，后台统一维护客户开通和计费策略。</div>
        </article>
      </div>
    </section>

    <section class="auth-card auth-card-product">
      <div class="auth-card-head">
        <h2 class="auth-title">用户登录</h2>
        <p class="auth-sub">请使用已通过管理员授权的用户账号</p>
      </div>
      <form id="loginForm" class="auth-form" data-login-role="user">
        <label for="username">用户名</label>
        <input id="username" name="username" autocomplete="username" required placeholder="请输入用户名" />

        <label for="password">密码</label>
        <span class="auth-login-password-field">
          <input id="password" name="password" type="password" autocomplete="current-password" required placeholder="请输入密码" />
          <button class="auth-login-password-toggle" type="button" data-auth-password-toggle aria-label="显示密码" title="显示密码" aria-controls="password" aria-pressed="false">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"></path><circle cx="12" cy="12" r="3"></circle><path class="auth-login-eye-slash" d="M4 20L20 4"></path></svg>
          </button>
        </span>
        <label class="auth-login-remember" data-auth-remember><input name="remember_me" type="checkbox"> <span>记住账号与登录状态</span></label>

        <div class="auth-submit-row">
          <button class="primary" type="submit">进入 Web 任务控制台</button>
        </div>
        <button class="auth-login-takeover" type="button" data-auth-login-takeover hidden>强制登录此账号</button>
      </form>
      <div id="authMsg" class="msg"></div>
      <div class="auth-quick-setup">
        <a class="btn ghost auth-quick-setup-link" href="/">返回用户首页</a>
      </div>
      <p class="auth-switch">没有账号？请在首页提交游客申请，授权后即可登录。</p>
    </section>
  </main>
  <script src="/assets/auth.js?v=__AUTH_JS_VERSION__"></script>
</body>
</html>

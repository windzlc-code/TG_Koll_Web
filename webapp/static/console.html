<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web 任务控制台</title>
  <link rel="stylesheet" href="/assets/console.css?v=__CONSOLE_CSS_VERSION__" />
</head>
  <body>
    <div id="toastHost" class="toast-host" aria-live="polite" aria-atomic="false"></div>
    <div class="console-shell">
    <aside class="console-sidebar">
      <div class="console-brand">
        <div class="brand-mark">WK</div>
        <div>
          <h1>Web 任务控制台</h1>
          <p>统一 Web 操作面板</p>
        </div>
      </div>

      <nav class="console-nav" aria-label="控制台导航">
        <button type="button" class="is-active nav-parent-toggle" data-view="workspace" aria-expanded="true">
          <span>任务工作台</span>
          <span class="nav-toggle-arrow" aria-hidden="true"></span>
        </button>
        <div class="sidebar-flow is-open" id="workspaceFlow">
          <div class="sidebar-flow-divider" aria-hidden="true"></div>
          <div class="module-menu" id="moduleMenu"></div>
        </div>
        <button type="button" data-view="tasks">任务队列</button>
        <button type="button" data-view="settings">系统状态</button>
      </nav>

      <div class="sidebar-bottom-actions">
        <a href="/persona-dashboard.html">人设看板</a>
        <button id="consoleSettings" type="button" data-view="console_settings" class="settings-entry">
          <span class="settings-entry-icon" aria-hidden="true">⚙</span>
          <span>设置</span>
        </button>
      </div>
    </aside>

    <main class="console-main">
      <header class="console-topbar">
        <div>
          <div class="eyebrow">控制台</div>
          <h2 id="viewTitle">任务工作台</h2>
        </div>
        <div class="topbar-actions">
          <button id="refreshAll" type="button">刷新</button>
          <button id="openAdmin" type="button" class="admin-only" hidden>运营后台</button>
        </div>
      </header>

      <section class="view is-active" data-panel="workspace">
        <div class="workbench-layout">
          <section class="module-panel">
            <div class="panel-head">
              <div>
                <div class="eyebrow" id="moduleEyebrow">流程</div>
                <h3 id="moduleTitle">我的人设</h3>
              </div>
              <div class="panel-head-actions">
                <span class="module-chip" id="watchingTask" hidden></span>
                <span class="module-chip" id="moduleCallback" hidden></span>
              </div>
            </div>
            <div id="commandMsg" class="notice" role="status"></div>
            <div id="moduleBody"></div>
            <div id="eventStream" class="event-stream" aria-live="polite"></div>
          </section>
        </div>
      </section>

      <section class="view" data-panel="tasks">
        <div class="task-table" id="taskTable"></div>
        <div id="taskQueueMsg" class="notice" role="status"></div>
      </section>

      <section class="view" data-panel="accounts">
        <div class="account-browser-shell" id="accountBrowserShell" data-account-browser-panel="accounts">
          <div class="account-browser-toolbar">
            <div class="account-browser-tabs" role="tablist" aria-label="账号与浏览器切换">
              <button id="accountBrowserAccountsTab" type="button" class="is-active" data-account-browser-tab="accounts" role="tab" aria-selected="true" aria-controls="accountBrowserAccountsPage">账号池</button>
              <button id="accountBrowserBrowsersTab" type="button" data-account-browser-tab="browsers" role="tab" aria-selected="false" aria-controls="accountBrowserBrowsersPage">浏览器</button>
            </div>
            <button id="refreshAccounts" type="button">刷新账号</button>
          </div>
          <section id="accountBrowserAccountsPage" class="account-browser-page is-active" data-account-browser-page="accounts" role="tabpanel" aria-labelledby="accountBrowserAccountsTab">
            <div class="account-grid" id="accountGrid"></div>
          </section>
          <section id="accountBrowserBrowsersPage" class="account-browser-page" data-account-browser-page="browsers" role="tabpanel" aria-labelledby="accountBrowserBrowsersTab" hidden>
            <div id="liveBrowserSessions"></div>
          </section>
        </div>
      </section>

      <section class="view" data-panel="settings">
        <div class="status-grid">
          <div class="status-card">
            <div class="eyebrow">任务执行器</div>
            <strong id="workerState">-</strong>
            <span id="workerDetail">等待读取</span>
          </div>
          <div class="status-card">
            <div class="eyebrow">Web 控制台</div>
            <strong>新面板</strong>
            <span>入口统一到 Web 控制台。</span>
          </div>
          <div class="status-card">
            <div class="eyebrow">浏览器环境</div>
            <strong>浏览器环境</strong>
            <span>持久化浏览器环境 + 代理 + 有头模式。</span>
          </div>
        </div>
      </section>

      <section class="view" data-panel="console_settings">
        <div id="consoleSettingsBody"></div>
        <div id="consoleSettingsMsg" class="notice"></div>
      </section>
    </main>
  </div>

  <script>
    window.__CONSOLE_BOOTSTRAP__ = __CONSOLE_BOOTSTRAP_JSON__;
  </script>
  <script src="/assets/console.js?v=__CONSOLE_JS_VERSION__"></script>
</body>
</html>
